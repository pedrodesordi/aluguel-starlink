{% extends "base.html" %}
{% block title %}{{ 'Editar' if equipamento.id else 'Novo' }} Equipamento{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-2 mb-3">
  <a href="/equipamentos/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h4 class="mb-0">{{ 'Editar' if equipamento.id else 'Novo' }} Equipamento</h4>
</div>

<div class="card border-0 shadow-sm" style="max-width:680px">
  <div class="card-body">
    <form method="post" action="{{ '/equipamentos/' + equipamento.id + '/editar' if equipamento.id else '/equipamentos/novo' }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Número de Série <span class="text-danger">*</span></label>
          <input type="text" name="numero_serie" class="form-control" value="{{ equipamento.numero_serie or '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Número Starlink</label>
          <input type="text" name="numero_starlink" class="form-control" value="{{ equipamento.numero_starlink or '' }}" placeholder="ID da conta Starlink">
        </div>
        <div class="col-md-8">
          <label class="form-label">Modelo <span class="text-danger">*</span></label>
          <input type="text" name="modelo" class="form-control" value="{{ equipamento.modelo or '' }}" placeholder="Ex: Starlink Standard" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            {% for s in ['disponivel','alugado','manutencao','baixado'] %}
            <option value="{{ s }}" {{ 'selected' if equipamento.status == s }}>{{ s | title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Tipo de Plano</label>
          <select name="tipo_plano" id="tipo_plano" class="form-select" onchange="sugerirCusto()">
            <option value="">Não informado</option>
            {% for p in ['100GB','ILIMITADO','PAUSADO'] %}
            <option value="{{ p }}" {{ 'selected' if equipamento.tipo_plano == p }}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Custo Mensal (R$)</label>
          <input type="number" step="0.01" name="custo_mensalidade" id="custo_mensalidade"
                 class="form-control" value="{{ equipamento.custo_mensalidade or '' }}" placeholder="0,00">
          <div class="form-text">Valor pago à Starlink por mês.</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Dia de vencimento da mensalidade</label>
          <select name="vencimento_mensalidade" class="form-select">
            <option value="0">Não informado</option>
            {% for d in range(1, 32) %}
            <option value="{{ d }}" {{ 'selected' if equipamento.vencimento_mensalidade == d }}>Dia {{ d }}</option>
            {% endfor %}
          </select>
          <div class="form-text">Dia do mês em que o plano Starlink renova.</div>
        </div>
        <div class="col-12">
          <label class="form-label">Descrição / Observações</label>
          <textarea name="descricao" class="form-control" rows="2">{{ equipamento.descricao or '' }}</textarea>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
        <a href="/equipamentos/" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<script>
const CUSTOS_PLANO = { '100GB': 315.00, 'ILIMITADO': 576.00, 'PAUSADO': 36.00 };
function sugerirCusto() {
  const plano = document.getElementById('tipo_plano').value;
  const campo = document.getElementById('custo_mensalidade');
  if (plano && CUSTOS_PLANO[plano] !== undefined && !campo.value) {
    campo.value = CUSTOS_PLANO[plano].toFixed(2);
  }
}
</script>
{% endblock %}

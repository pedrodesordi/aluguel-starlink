<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Termo Assinado — Aluguel Starlink</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center" style="max-width:500px">
  <i class="bi bi-check-circle-fill text-success" style="font-size:4rem"></i>
  <h3 class="mt-3">Termo assinado com sucesso!</h3>
  <p class="text-muted">Seu aceite foi registrado digitalmente com data, hora e IP.</p>
  {% if termo and termo.pdf_path %}
  <a href="/termos/{{ termo.token }}/pdf" class="btn btn-success mt-2">
    <i class="bi bi-download"></i> Baixar PDF do Termo
  </a>
  {% endif %}
  <p class="mt-4 small text-muted">Você pode fechar esta página.</p>
</div>
</body>
</html>
